name: Alpaca Trading Pipeline

on:
  schedule:
    - cron: '15 8 * * 1-5'    # PREMARKET  — 4:15 AM EDT (1:45 PM IST)
    - cron: '30 20 * * 1-5'   # POSTCLOSE  — 4:30 PM EDT (2:00 AM IST)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AlpacaDaily
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python AlpacaDaily.py

      - name: Run Journal
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python Alpaca_Journal_NewGroq.py
